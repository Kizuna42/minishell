name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install readline
        run: sudo apt-get update && sudo apt-get install -y libreadline-dev

      - name: Build (mandatory)
        run: make

      - name: Build (bonus)
        run: make bonus

      - name: Run test suite
        run: make test
